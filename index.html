<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julio Proyectista | Herramientas Eléctricas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e14;
  --surface: #111720;
  --surface2: #161d29;
  --border: #1e2a3a;
  --accent: #00c896;
  --accent2: #0ea5e9;
  --text: #e2e8f0;
  --muted: #64748b;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --display: 'Bebas Neue', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,200,150,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,150,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Glow top */
body::after {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 700px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(0,200,150,0.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 860px;
  margin: 0 auto;
  padding: 0 1.5rem;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-top: 4rem;
  padding-bottom: 4rem;
}

/* ── HEADER ── */
header {
  text-align: center;
  margin-bottom: 4rem;
  animation: fadeDown 0.7s ease both;
}

.eyebrow {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.eyebrow::before,
.eyebrow::after {
  content: '';
  width: 40px;
  height: 1px;
  background: var(--accent);
  opacity: 0.4;
}

h1 {
  font-family: var(--display);
  font-size: clamp(3.5rem, 10vw, 6rem);
  letter-spacing: 4px;
  color: var(--text);
  line-height: 1;
  margin-bottom: 0.5rem;
}

h1 span { color: var(--accent); }

.subtitle {
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 1rem;
}

.divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  margin: 2rem auto 0;
}

/* ── CARDS ── */
.tools-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  animation: fadeUp 0.7s 0.2s ease both;
}

@media (max-width: 600px) {
  .tools-grid { grid-template-columns: 1fr; }
}

.tool-card {
  display: block;
  text-decoration: none;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 2rem;
  position: relative;
  overflow: hidden;
  transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
  cursor: pointer;
}

.tool-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  transition: opacity 0.25s;
}

.tool-card.green::before {
  background: linear-gradient(90deg, var(--accent), transparent);
}

.tool-card.blue::before {
  background: linear-gradient(90deg, var(--accent2), transparent);
}

/* Hover glow background */
.tool-card::after {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.tool-card.green::after {
  background: radial-gradient(ellipse at top left, rgba(0,200,150,0.07), transparent 70%);
}

.tool-card.blue::after {
  background: radial-gradient(ellipse at top left, rgba(14,165,233,0.07), transparent 70%);
}

.tool-card:hover {
  transform: translateY(-4px);
  border-color: #2e3f55;
}

.tool-card.green:hover {
  box-shadow: 0 12px 40px rgba(0,200,150,0.12);
  border-color: rgba(0,200,150,0.35);
}

.tool-card.blue:hover {
  box-shadow: 0 12px 40px rgba(14,165,233,0.12);
  border-color: rgba(14,165,233,0.35);
}

.tool-card:hover::after { opacity: 1; }

/* Card icon */
.tool-icon {
  width: 48px;
  height: 48px;
  margin-bottom: 1.25rem;
  position: relative;
  z-index: 1;
}

.tool-icon svg {
  width: 100%;
  height: 100%;
}

/* Card content */
.tool-tag {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
  position: relative;
  z-index: 1;
}

.tool-card.green .tool-tag { color: var(--accent); }
.tool-card.blue  .tool-tag { color: var(--accent2); }

.tool-title {
  font-family: var(--display);
  font-size: 1.8rem;
  letter-spacing: 2px;
  color: var(--text);
  margin-bottom: 0.75rem;
  line-height: 1.1;
  position: relative;
  z-index: 1;
}

.tool-desc {
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.65;
  margin-bottom: 1.5rem;
  position: relative;
  z-index: 1;
}

.tool-specs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 1.75rem;
  position: relative;
  z-index: 1;
}

.spec-tag {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 1px;
  padding: 3px 8px;
  border: 1px solid var(--border);
  color: var(--muted);
  background: var(--bg);
}

.tool-cta {
  font-family: var(--mono);
  font-size: 0.72rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: gap 0.2s;
  position: relative;
  z-index: 1;
}

.tool-card.green .tool-cta { color: var(--accent); }
.tool-card.blue  .tool-cta { color: var(--accent2); }

.tool-card:hover .tool-cta { gap: 14px; }

.cta-arrow {
  font-size: 1rem;
  transition: transform 0.2s;
}

.tool-card:hover .cta-arrow { transform: translateX(4px); }

/* ── FOOTER ── */
footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem 1.5rem;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: fadeUp 0.7s 0.4s ease both;
}

footer span { color: var(--accent); opacity: 0.7; }

/* ── ANIMATIONS ── */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>

</head>
<body>

<div class="page">

  <div class="tools-grid">

    <a class="tool-card green" href="escalerilla.html">
      <div class="tool-title">LLENADO<br>ESCALERILLA</div>
      <div class="tool-cta">Abrir calculadora <span class="cta-arrow">→</span></div>
    </a>

    <a class="tool-card blue" href="conduits.html">
